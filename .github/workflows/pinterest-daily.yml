name: Pinterest Daily Report

on:
  schedule:
    - cron: '30 4 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  scrape-and-report:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run Pinterest automation
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          EMAIL_HOST: ${{ secrets.EMAIL_HOST }}
          EMAIL_PORT: ${{ secrets.EMAIL_PORT }}
        run: npx tsx src/index.ts

      - name: Commit and push keyword queue updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add keywords.txt processed_keywords.txt
          git diff --cached --quiet || git commit -m "chore: update keyword queue after daily run"
          git push
